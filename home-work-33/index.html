<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gulp Project</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <header class="header">
    <div class="container">
      <h1 class="header__title">Gulp Automation</h1>
      <p class="header__subtitle">SCSS + Autoprefixer + Minification + Live
        Reload</p>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section class="features">
        <h2 class="features__title">Features</h2>
        <div class="features__grid">
          <div class="feature-card">
            <h3>SCSS</h3>
            <p>Compile SCSS to CSS</p>
          </div>
          <div class="feature-card">
            <h3>Autoprefixer</h3>
            <p>Add vendor prefixes</p>
          </div>
          <div class="feature-card">
            <h3>Minification</h3>
            <p>Minimize CSS files</p>
          </div>
          <div class="feature-card">
            <h3>Live Reload</h3>
            <p>Auto refresh browser</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Gulp Project</p>
    </div>
  </footer>
</body>

</html>
